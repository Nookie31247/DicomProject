services:
  pacs-server:
    image: orthancteam/orthanc:latest
    container_name: pacs-orthanc
    restart: always
    ports:
      - "${ORTHANC_HTTP_PORT:-8042}:8042"
      - "${ORTHANC_DICOM_PORT:-4242}:4242"
    environment:
      ORTHANC__NAME: "${ORTHANC_NAME:-PACS_MAIN}"
      ORTHANC__DICOM_AET: "${ORTHANC_NAME:-PACS_MAIN}"
      DICOM_WEB_PLUGIN_ENABLED: "true"
      ORTHANC__DICOM_WEB__ENABLE: "true"
      DICOM_MODALITIES: |
        {
          "anonymization-server": ["${ORTHANC_NAME_ANON:-PACS_ANON}", "pacs-orthanc-anonymization", 4242]
        }
      ORTHANC_EXPLORER_2_PLUGIN_ENABLED: "true"
      ORTHANC__ORTHANC_EXPLORER2__ENABLE: "true"
      ORTHANC__ORTHANC_EXPLORER2__IS_DEFAULT_ORTHANC_UI: "true"
      ORTHANC__AUTHENTICATION_ENABLED: "false"
    volumes:
      - pacs-orthanc:/var/lib/orthanc/db
    deploy:
      resources:
        limits:
          memory: 500m
        reservations:
          memory: 200m

  pacs-db:
    image: mysql:8.0
    container_name: pacs-db
    restart: always
    ports:
      - "${RDS_PORT:-3306}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "${RDS_PASS:-pacs_password}"
      MYSQL_DATABASE: "${RDS_NAME:-pacsdb}"
    volumes:
      - pacs-db:/var/lib/mysql
    deploy:
      resources:
        limits:
          memory: 400m
        reservations:
          memory: 150m

  redis:
    image: redis:latest
    container_name: pacs-redis
    restart: always
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - pacs-redis:/var/lib/redis
    deploy:
      resources:
        limits:
          memory: 100m
        reservations:
          memory: 30m

  pacs-server-anonymization:
    image: orthancteam/orthanc:latest
    container_name: pacs-orthanc-anonymization
    restart: always
    ports:
      - "${ORTHANC_HTTP_PORT_ANON:-8043}:8042"
      - "${ORTHANC_DICOM_PORT_ANON:-4243}:4242"
    environment:
      ORTHANC__NAME: "${ORTHANC_NAME_ANON:-PACS_ANON}"
      ORTHANC__DICOM_AET: "${ORTHANC_NAME_ANON:-PACS_ANON}"
      DICOM_WEB_PLUGIN_ENABLED: "true"
      ORTHANC__DICOM_WEB__ENABLE: "true"
      ORTHANC_EXPLORER_2_PLUGIN_ENABLED: "true"
      ORTHANC__ORTHANC_EXPLORER2__ENABLE: "true"
      ORTHANC__ORTHANC_EXPLORER2__IS_DEFAULT_ORTHANC_UI: "true"
      ORTHANC__AUTHENTICATION_ENABLED: "false"
    volumes:
      - pacs-orthanc-anonymization:/var/lib/orthanc/db
    deploy:
      resources:
        limits:
          memory: 500m
        reservations:
          memory: 200m

  pacs-db-anonymization:
    image: mysql:8.0
    container_name: pacs-db-anonymization
    restart: always
    ports:
      - "${RDS_PORT_ANON:-3307}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "${RDS_PASS_ANON:-anonymization_password}"
      MYSQL_DATABASE: "${RDS_NAME_ANON:-anonymizationdb}"
    volumes:
      - pacs-db-anonymization:/var/lib/mysql
    deploy:
      resources:
        limits:
          memory: 400m
        reservations:
          memory: 150m

  redis-anonymization:
    image: redis:latest
    container_name: pacs-redis-anonymization
    restart: always
    ports:
      - "${REDIS_PORT_ANON:-6380}:6379"
    volumes:
      - pacs-redis-anonymization:/data
    deploy:
      resources:
        limits:
          memory: 100m
        reservations:
          memory: 30m

  dicom-back:
    image: tenye725z/dicom-back:latest
    container_name: dicom-back
    restart: always
    ports:
      - "8080:8080"
    environment:
      RDS_HOST: pacs-db
      RDS_PORT: 3306
      RDS_NAME: "${RDS_NAME:-pacsdb}"
      RDS_PASS: "${RDS_PASS:-pacs_password}"
      REDIS_HOST: pacs-redis
      REDIS_PORT: 6379
      ORTHANC_URL: http://pacs-orthanc:8042
      ANON_APP_URL: http://back-anonymization:8081
      CORS_ORIGINS: "${PUBLIC_ORIGIN:-http://localhost:3000}"
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      - pacs-db
      - redis
      - pacs-server
    deploy:
      resources:
        limits:
          memory: 900m
        reservations:
          memory: 400m

  back-anonymization:
    image: tenye725z/back-anonymization:latest
    container_name: back-anonymization
    restart: always
    ports:
      - "8081:8081"
    environment:
      RDS_HOST: pacs-db-anonymization
      RDS_PORT: 3306
      RDS_NAME: "${RDS_NAME_ANON:-anonymizationdb}"
      RDS_PASS: "${RDS_PASS_ANON:-anonymization_password}"
      REDIS_HOST: pacs-redis-anonymization
      REDIS_PORT: 6379
      ORTHANC_URL: http://pacs-orthanc-anonymization:8042
      CORS_ORIGINS: "${PUBLIC_ORIGIN:-http://localhost:3000}"
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      - pacs-db-anonymization
      - redis-anonymization
      - pacs-server-anonymization
    deploy:
      resources:
        limits:
          memory: 700m
        reservations:
          memory: 300m


volumes:
  pacs-orthanc:
  pacs-db:
  pacs-redis:
  pacs-orthanc-anonymization:
  pacs-db-anonymization:
  pacs-redis-anonymization: