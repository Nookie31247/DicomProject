services:
  pacs-server-anonymization:
    image: orthancteam/orthanc:latest
    container_name: pacs-orthanc-anonymization
    restart: always
    ports:
      - "${ORTHANC_HTTP_PORT_ANON:-8043}:8042"
      - "${ORTHANC_DICOM_PORT_ANON:-4243}:4242"
    environment:
      ORTHANC__NAME: "${ORTHANC_NAME_ANON:-PACS_ANON}"
      ORTHANC__DICOM_AET: "${ORTHANC_NAME_ANON:-PACS_ANON}"
      DICOM_WEB_PLUGIN_ENABLED: "true"
      ORTHANC__DICOM_WEB__ENABLE: "true"
      ORTHANC_EXPLORER_2_PLUGIN_ENABLED: "true"
      ORTHANC__ORTHANC_EXPLORER2__ENABLE: "true"
      ORTHANC__ORTHANC_EXPLORER2__IS_DEFAULT_ORTHANC_UI: "true"
      ORTHANC__AUTHENTICATION_ENABLED: "false"
    volumes:
      - pacs-orthanc-anonymization:/var/lib/orthanc/db
    deploy:
      resources:
        limits:
          memory: 500m
        reservations:
          memory: 200m

  pacs-db-anonymization:
    image: mysql:8.0
    container_name: pacs-db-anonymization
    restart: always
    ports:
      - "${RDS_PORT_ANON:-3307}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: "${RDS_PASS_ANON:-anonymization_password}"
      MYSQL_DATABASE: "${RDS_NAME_ANON:-anonymizationdb}"
    volumes:
      - pacs-db-anonymization:/var/lib/mysql
    deploy:
      resources:
        limits:
          memory: 400m
        reservations:
          memory: 150m

  redis-anonymization:
    image: redis:latest
    container_name: pacs-redis-anonymization
    restart: always
    ports:
      - "${REDIS_PORT_ANON:-6380}:6379"
    volumes:
      - pacs-redis-anonymization:/data
    deploy:
      resources:
        limits:
          memory: 100m
        reservations:
          memory: 30m

  back-anonymization:
    image: tenye725z/back-anonymization:latest
    container_name: back-anonymization
    restart: always
    ports:
      - "8081:8081"
    environment:
      RDS_HOST: pacs-db-anonymization
      RDS_PORT: 3306
      RDS_NAME: "${RDS_NAME_ANON:-anonymizationdb}"
      RDS_PASS: "${RDS_PASS_ANON:-anonymization_password}"
      REDIS_HOST: pacs-redis-anonymization
      REDIS_PORT: 6379
      ORTHANC_URL: http://pacs-orthanc-anonymization:8042
      CORS_ORIGINS: "${PUBLIC_ORIGIN:-http://localhost:3000}"
      JWT_SECRET_KEY: "${JWT_SECRET_KEY}"
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      - pacs-db-anonymization
      - redis-anonymization
      - pacs-server-anonymization
    deploy:
      resources:
        limits:
          memory: 700m
        reservations:
          memory: 300m

volumes:
  pacs-orthanc-anonymization:
  pacs-db-anonymization:
  pacs-redis-anonymization:
