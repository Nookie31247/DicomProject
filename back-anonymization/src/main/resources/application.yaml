spring:
  application:
    name: back-anonymization

  datasource:
    url: jdbc:mysql://${RDS_HOST:localhost}:${RDS_PORT:3307}/${RDS_NAME:anonymizationdb}?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    username: ${RDS_USER:root}
    password: ${RDS_PASS:anonymization_password}
    driver-class-name: com.mysql.cj.jdbc.Driver

    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 300000

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6380}

  jpa:
    hibernate:
      ddl-auto: create-drop
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
        use_sql_comments: true

orthanc:
  url: ${ORTHANC_URL:http://localhost:8043}

app:
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000}
server:
  port: ${SERVER_PORT:8081}

jwt:
  secret-key: ${JWT_SECRET_KEY:66eI6rCA7LigIOuvuO2DgOy8gCDrgpjro6jsubTrr7jrhbgg66+47L2U7Yag}
