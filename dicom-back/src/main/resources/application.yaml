spring:
  application:
    name: dicom-back

  servlet:
    multipart:
      max-file-size: 300MB
      max-request-size: 1500MB

  datasource:
    url: jdbc:mysql://${RDS_HOST:localhost}:${RDS_PORT:3306}/${RDS_NAME:pacsdb}?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    username: ${RDS_USER:root}
    password: ${RDS_PASS:pacs_password}
    driver-class-name: com.mysql.cj.jdbc.Driver

    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 300000

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  jpa:
    hibernate:
      ddl-auto: update
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
        use_sql_comments: true;

server:
  port: ${SERVER_PORT:8080}
  tomcat:
    max-http-form-post-size: 1500MB
    max-swallow-size: 1500MB
    # Spring Boot 3.5(Tomcat 10.1.39+)부터 멀티파트 요청의 파트(파일+필드) 개수를 기본 10개로 제한한다.
    # DICOM 검사 하나에 인스턴스가 수천 장(폴더 업로드 시 5000장 이상)일 수 있어서 넉넉하게 올려둔다.
    # 어차피 전체 요청 용량은 max-request-size(1500MB)로 이미 막혀 있어서, 파트 개수만 늘리는 건
    # DoS 위험을 크게 키우지 않는다.
    max-part-count: 10000
  anonAppUrl: ${ANON_APP_URL:http://localhost:8081}

orthanc:
  url: ${ORTHANC_URL:http://localhost:8042}


app:
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000}
jwt:
  secret-key: ${JWT_SECRET_KEY:66eI6rCA7LigIOuvuO2DgOy8gCDrgpjro6jsubTrr7jrhbgg66+47L2U7Yag}
