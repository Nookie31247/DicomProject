spring:
  application:
    name: dicom-back

  servlet:
    multipart:
      max-file-size: 300MB
      max-request-size: 1500MB

  datasource:
    url: jdbc:mysql://${RDS_HOST:localhost}:${RDS_PORT:3306}/${RDS_NAME:pacsdb}?useSSL=false&serverTimezone=Asia/Seoul&characterEncoding=UTF-8&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    username: ${RDS_USER:root}
    password: ${RDS_PASS:pacs_password}
    driver-class-name: com.mysql.cj.jdbc.Driver

    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 300000

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: create-drop
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
        use_sql_comments: true;

server:
  tomcat:
    max-http-form-post-size: 1500MB
    max-swallow-size: 1500MB
    # Spring Boot 3.5(Tomcat 10.1.39+)부터 멀티파트 요청의 파트(파일+필드) 개수를 기본 10개로 제한한다.
    # DICOM 검사 하나에 인스턴스가 수백 장일 수 있어서 넉넉하게 올려둔다.
    max-part-count: 1000

orthanc:
  url: http://localhost:8042
  username: orthanc
  password: orthanc

app:
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:3000}
